<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sugar Rush Snake 🐍</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg: #06010f;
    --panel: #0d0222;
    --border: #1e0a38;
    --purple: #7c3aed;
    --purple-light: #a855f7;
    --candy1: #f472b6;
    --candy2: #facc15;
    --candy3: #34d399;
    --text: #e9d5ff;
    --muted: #4c1d95;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  canvas { touch-action: none; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; padding: 0 12px; }
  .screen.active { display: flex; }

  /* ── SELECT SCREEN ── */
  #selectScreen { gap: 10px; touch-action: pan-y; }

  .game-title {
    font-family: 'Fredoka One', cursive;
    font-size: 32px;
    background: linear-gradient(135deg, #f472b6, #facc15, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    margin-bottom: 4px;
    filter: drop-shadow(0 0 20px #f472b680);
  }

  .game-sub { color: var(--muted); font-size: 11px; letter-spacing: 1px; text-align: center; margin-bottom: 6px; }

  .species-carousel { display: flex; gap: 8px; overflow-x: scroll; width: 100%; padding: 4px 0 6px; scrollbar-width: none; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; touch-action: pan-x; }
  .species-carousel::-webkit-scrollbar { display: none; }

  .sp-thumb {
    flex: 0 0 68px; width: 68px; height: 68px; border-radius: 14px;
    border: 2px solid var(--border); background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s; position: relative; overflow: hidden;
    scroll-snap-align: start; -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .sp-thumb.active { transform: scale(1.08); }
  .sp-thumb img { width: 62px; height: 62px; object-fit: contain; display: block; }
  .sp-emoji { font-size: 26px; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

  .selected-preview {
    width: 100%; background: var(--panel); border-radius: 18px;
    border: 1px solid var(--border); padding: 12px;
    display: flex; gap: 12px; align-items: center;
  }
  .preview-img { width: 90px; height: 90px; object-fit: contain; flex-shrink: 0; }
  .preview-info { flex: 1; }
  .preview-name { font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--text); }
  .preview-arch { color: var(--muted); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .mini-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .mini-stat label { color: var(--muted); font-size: 8px; display: block; margin-bottom: 1px; }
  .mini-bar { height: 3px; background: #1e0a38; border-radius: 2px; }
  .mini-fill { height: 3px; border-radius: 2px; }

  .name-row { display: flex; gap: 8px; width: 100%; }
  .name-input {
    flex: 1; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 14px;
    padding: 9px 12px; outline: none; font-family: 'Nunito', sans-serif;
  }
  .name-input::placeholder { color: var(--muted); }

  .play-btn {
    width: 100%; padding: 13px; border: none; border-radius: 14px;
    font-family: 'Fredoka One', cursive; font-size: 20px;
    background: linear-gradient(135deg, #7c3aed, #f472b6);
    color: #fff; cursor: pointer; letter-spacing: .5px;
    box-shadow: 0 4px 24px #7c3aed60;
    transition: transform .1s, box-shadow .1s;
  }
  .play-btn:active { transform: scale(0.97); }

  /* ── GAME SCREEN ── */
  #gameScreen { gap: 0; padding: 0; max-width: 420px; width: 100%; }

  .hud {
    width: 100%; background: #0d0222cc; padding: 8px 14px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .hud-score { text-align: center; }
  .hud-label { color: var(--muted); font-size: 9px; letter-spacing: .5px; }
  .hud-value { font-family: 'Fredoka One', cursive; font-size: 22px; color: var(--candy2); }
  .hud-player { display: flex; align-items: center; gap: 6px; }
  .hud-snake { width: 32px; height: 32px; object-fit: contain; }
  .hud-name { font-size: 11px; font-weight: 700; color: var(--text); }

  #gameCanvas {
    display: block;
    background: #06010f;
    touch-action: none;
  }

  .controls-bar {
    width: 100%; background: #0d0222cc; padding: 8px 12px;
    display: flex; gap: 8px; align-items: center; justify-content: center;
    border-top: 1px solid var(--border);
  }
  .ctrl-btn {
    background: #1a0a38; border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 11px; padding: 6px 12px; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 700;
  }
  .power-slot {
    background: #1a0a38; border: 1px solid var(--border); border-radius: 10px;
    padding: 5px 10px; font-size: 14px; display: flex; align-items: center; gap: 4px;
  }
  .power-slot span { color: var(--muted); font-size: 9px; }

  /* ── GAME OVER ── */
  #gameOverScreen {
    text-align: center; gap: 14px;
  }
  .go-title {
    font-family: 'Fredoka One', cursive; font-size: 42px;
    filter: drop-shadow(0 0 20px currentColor);
  }
  .go-title.win { color: #facc15; }
  .go-title.lose { color: #f472b6; }
  .go-snake { width: 120px; height: 120px; object-fit: contain; }
  .go-score { font-family: 'Fredoka One', cursive; font-size: 28px; color: var(--text); }
  .go-sub { color: var(--muted); font-size: 12px; }
  .go-btn {
    padding: 12px 32px; border: none; border-radius: 12px;
    font-family: 'Fredoka One', cursive; font-size: 18px;
    background: linear-gradient(135deg, #7c3aed, #f472b6);
    color: #fff; cursor: pointer;
  }

  /* swipe indicator */
  .swipe-hint {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(124,58,237,.8); color: #f5f3ff; font-size: 11px;
    padding: 4px 14px; border-radius: 20px; pointer-events: none;
    animation: fadeOut 3s forwards;
  }
  @keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<!-- SELECT SCREEN -->
<div class="screen active" id="selectScreen">
  <div class="game-title">Sugar Rush Snake</div>
  <div class="game-sub">🍬 ELIGE TU SERPIENTE Y COMPITE 🍬</div>

  <div class="species-carousel" id="spCarousel"></div>
  <div class="selected-preview" id="spPreview"></div>

  <div class="name-row">
    <input class="name-input" id="nameInput" placeholder="Tu nombre..." maxlength="12" value="Jugador">
  </div>

  <button class="play-btn" onclick="startGame()">🐍 ¡JUGAR!</button>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">
  <div class="hud">
    <div class="hud-player">
      <img class="hud-snake" id="hudSnakeImg" src="" alt="">
      <div>
        <div class="hud-name" id="hudName">Jugador</div>
        <div class="hud-label">Tamaño: <span id="hudSize">1</span></div>
      </div>
    </div>
    <div class="hud-score">
      <div class="hud-label">PUNTOS</div>
      <div class="hud-value" id="hudScore">0</div>
    </div>
    <div class="hud-player">
      <div>
        <div class="hud-name">NIVEL</div>
        <div class="hud-label" id="hudLevel">1</div>
      </div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="controls-bar">
    <div class="power-slot">🍭<span>x0</span></div>
    <div class="power-slot">❄️<span>LISTO</span></div>
    <div class="power-slot">⚡<span>x0</span></div>
    <button class="ctrl-btn" onclick="pauseGame()">⏸</button>
    <button class="ctrl-btn" onclick="goToSelect()">🏠</button>
  </div>
</div>

<!-- GAME OVER -->
<div class="screen" id="gameOverScreen">
  <div class="go-title" id="goTitle">¡GANASTE!</div>
  <img class="go-snake" id="goSnakeImg" src="" alt="">
  <div class="go-score" id="goScore">0 puntos</div>
  <div class="go-sub" id="goSub">Tamaño máximo alcanzado: 1</div>
  <button class="go-btn" onclick="startGame()">🔄 Jugar de nuevo</button>
  <button class="go-btn" style="background:#1a0a38;color:#a855f7;margin-top:-6px;" onclick="goToSelect()">← Cambiar serpiente</button>
</div>

<script>
// ─── SPECIES DATA ───
const SPECIES = [
  { name:'Mamba Púrpura',arch:'Sombra',     glow:'#a855f7', stats:{vel:80,res:55,atk:75,pts:65},
    img:'mamba-purpura.png', emoji:'🟣', parts:null },
  { name:'Cobra Azul',   arch:'Cazadora',   glow:'#06b6d4', stats:{vel:75,res:50,atk:70,pts:60},
    img:'cobra-azul.png', emoji:'🩵', parts:null },
  { name:'Pitón Fuego',  arch:'Tanque Máx', glow:'#f97316', stats:{vel:30,res:98,atk:70,pts:45},
    img:'piton-fuego.png', emoji:'🟠', parts:null },
  { name:'Víbora Rosa',  arch:'Agresiva',   glow:'#ec4899', stats:{vel:85,res:35,atk:90,pts:55},
    img:'vibora-rosa.png', emoji:'🩷', parts:null },
  { name:'Boa Esmeralda',arch:'Tanque',     glow:'#22c55e', stats:{vel:40,res:90,atk:65,pts:50},
    img:'boa-esmeralda.png', emoji:'🟢', parts:null },
  { name:'Cobra Negra',  arch:'Élite',      glow:'#e97316', stats:{vel:85,res:80,atk:95,pts:80},
    img:'cobra-negra.png', emoji:'⚫', parts:'cobra-negra' },
  { name:'Víbora Roja',  arch:'Épica',      glow:'#ef4444', stats:{vel:88,res:70,atk:92,pts:75},
    img:'vibora-roja.png', emoji:'🔴', parts:null },
  { name:'Pitón Dorada', arch:'Premium',    glow:'#facc15', stats:{vel:60,res:95,atk:80,pts:90},
    img:'piton-dorada.png', emoji:'🟡', parts:null },
  { name:'Arcoíris',     arch:'Legendaria', glow:'#f0abfc', stats:{vel:95,res:95,atk:95,pts:95},
    img:'arcoiris.png', emoji:'🌈', parts:null },
];

const IMG_BASE = 'assets/snakes/';

// Debug: log which images fail to load
function debugImg(src, name) {
  const im = new Image();
  im.onload = () => console.log('✅ Loaded:', name);
  im.onerror = () => console.error('❌ Failed:', name, src);
  im.src = src;
}
const snakeImgs = {};
const snakeParts = {}; // {head, body, turn, tail} images per species

// Debug all images
SPECIES.forEach(sp => { if(sp.img) debugImg(IMG_BASE + sp.img, sp.name); });

SPECIES.forEach((sp,i)=>{
  if(sp.img){
    const im = new Image();
    im.src = IMG_BASE + sp.img;
    snakeImgs[i] = im;
  }
  if(sp.parts){
    const base = sp.parts; // e.g. 'cobra-negra'
    snakeParts[i] = {};
    ['head','body','turn','tail'].forEach(key=>{
      const im = new Image();
      im.src = IMG_BASE + 'parts/' + base + '-' + key + '.png';
      snakeParts[i][key] = im;
    });
  }
});

let selSp = 0;

// ─── SELECT SCREEN ───
function buildSelect(){
  const carousel = document.getElementById('spCarousel');
  carousel.innerHTML = SPECIES.map((sp,i)=>{
    const isActive = i===selSp;
    const border = isActive ? sp.glow : '#1e0a38';
    const imgSrc = IMG_BASE + sp.img;
    const thumb = sp.img
      ? '<img src="' + imgSrc + '" alt="' + sp.name + '" onerror="this.style.display=\'none\';this.parentNode.querySelector(\'.sp-emoji\').style.display=\'flex\'">'
      : '';
    return '<div class="sp-thumb ' + (isActive?'active':'') + '" onclick="selectSp(' + i + ')" style="border-color:' + border + ';flex-shrink:0">'
      + thumb
      + '<div class="sp-emoji" style="display:' + (sp.img?'none':'flex') + '">' + sp.emoji + '</div>'
      + '</div>';
  }).join('');

  const sp = SPECIES[selSp];
  const preview = document.getElementById('spPreview');
  preview.innerHTML = `
    ${sp.img ? `<img class="preview-img" src="${IMG_BASE+sp.img}" alt="${sp.name}" style="filter:drop-shadow(0 0 12px ${sp.glow})">` : `<div style="font-size:60px;width:90px;text-align:center;">${sp.emoji}</div>`}
    <div class="preview-info">
      <div class="preview-name" style="color:${sp.glow}">${sp.name}</div>
      <div class="preview-arch">${sp.arch}</div>
      <div class="mini-stats">
        ${Object.entries(sp.stats).map(([k,v])=>`
          <div><label>${k.toUpperCase()}</label>
          <div class="mini-bar"><div class="mini-fill" style="width:${v}%;background:${sp.glow}"></div></div></div>
        `).join('')}
      </div>
    </div>
  `;
}

function selectSp(i){ selSp=i; buildSelect(); }
buildSelect();

// ─── GAME ENGINE ───
const CELL = 18;
let canvas, ctx, W, H, COLS, ROWS;
let snake, dir, nextDir, foods, powerups, score, gameLoop, paused, dead, level, frameCount;
let playerName = 'Jugador';

const CANDY_TYPES = [
  { emoji:'🍬', pts:2,  freq:0.55, color:'#f472b6' },
  { emoji:'🍭', pts:8,  freq:0.30, color:'#a855f7' },
  { emoji:'🧁', pts:20, freq:0.12, color:'#facc15' },
  { emoji:'💎', pts:50, freq:0.03, color:'#67e8f9' },
];

const POWERUP_TYPES = [
  { emoji:'❄️', label:'Congela IA' },
  { emoji:'⚡', label:'Turbo' },
  { emoji:'💣', label:'Bomba' },
];

function startGame(){
  playerName = document.getElementById('nameInput').value.trim() || 'Jugador';
  showScreen('gameScreen');

  canvas = document.getElementById('gameCanvas');
  const maxW = Math.min(window.innerWidth, 420);
  const maxH = window.innerHeight - 120;
  COLS = Math.floor(maxW / CELL);
  ROWS = Math.floor(maxH / CELL);
  W = COLS * CELL; H = ROWS * CELL;
  canvas.width = W; canvas.height = H;
  ctx = canvas.getContext('2d');

  // HUD
  const sp = SPECIES[selSp];
  document.getElementById('hudName').textContent = playerName;
  const hi = document.getElementById('hudSnakeImg');
  if(sp.img){ hi.src = IMG_BASE+sp.img; hi.style.display='block'; }
  else { hi.style.display='none'; }

  // init snake in center
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  snake = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  foods = []; powerups = [];
  score = 0; level = 1; frameCount = 0; paused = false; dead = false;

  spawnFoods(5);
  setupSwipe();
  setupKeys();

  clearInterval(gameLoop);
  const sp2 = SPECIES[selSp];
  const baseSpeed = 150 - (sp2.stats.vel * 0.8);
  gameLoop = setInterval(tick, Math.max(80, baseSpeed));

  // hint
  const hint = document.createElement('div');
  hint.className = 'swipe-hint';
  hint.textContent = '👆 Desliza para moverte';
  document.body.appendChild(hint);
  setTimeout(()=>hint.remove(), 3000);
}

function spawnFoods(n){
  for(let i=0;i<n;i++){
    let pos;
    do { pos = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
    while(snake.some(s=>s.x===pos.x&&s.y===pos.y) || foods.some(f=>f.x===pos.x&&f.y===pos.y));
    const r = Math.random();
    let cum = 0, type = CANDY_TYPES[0];
    for(const t of CANDY_TYPES){ cum+=t.freq; if(r<cum){type=t;break;} }
    foods.push({...pos, ...type});
  }
  // maybe spawn powerup
  if(Math.random() < 0.3 && powerups.length < 2){
    let pos;
    do { pos = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
    while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
    const pu = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
    powerups.push({...pos, ...pu, life:200});
  }
}

function tick(){
  if(paused||dead) return;
  frameCount++;
  dir = {...nextDir};

  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // wall wrap
  head.x = (head.x + COLS) % COLS;
  head.y = (head.y + ROWS) % ROWS;

  // self collision (skip first 5 segs)
  if(snake.slice(4).some(s=>s.x===head.x&&s.y===head.y)){
    endGame(false); return;
  }

  snake.unshift(head);

  // eat food
  const fi = foods.findIndex(f=>f.x===head.x&&f.y===head.y);
  if(fi>=0){
    const f = foods.splice(fi,1)[0];
    score += f.pts * (1 + (level-1)*0.1);
    score = Math.round(score);
    // grow: already grew by not popping
    spawnFoods(1);
  } else {
    snake.pop();
  }

  // eat powerup
  const pi = powerups.findIndex(p=>p.x===head.x&&p.y===head.y);
  if(pi>=0){ powerups.splice(pi,1); score += 15; }

  // age powerups
  powerups.forEach(p=>p.life--);
  powerups = powerups.filter(p=>p.life>0);

  // level up
  if(snake.length > 5 + level*3) level++;

  updateHUD();
  draw();
}

function updateHUD(){
  document.getElementById('hudScore').textContent = score;
  document.getElementById('hudSize').textContent = snake.length;
  document.getElementById('hudLevel').textContent = level;
}

function draw(){
  ctx.fillStyle = '#06010f';
  ctx.fillRect(0,0,W,H);

  // grid
  ctx.strokeStyle = 'rgba(124,58,237,0.06)';
  ctx.lineWidth = 0.5;
  for(let x=0;x<=COLS;x++){ ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,H);ctx.stroke(); }
  for(let y=0;y<=ROWS;y++){ ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(W,y*CELL);ctx.stroke(); }

  // foods
  foods.forEach(f=>{
    ctx.font = `${CELL-2}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(f.emoji, f.x*CELL+CELL/2, f.y*CELL+CELL/2);
    // glow ring for rare
    if(f.pts >= 20){
      ctx.beginPath();
      ctx.arc(f.x*CELL+CELL/2, f.y*CELL+CELL/2, CELL*0.6, 0, Math.PI*2);
      ctx.strokeStyle = f.color;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.4 + 0.3*Math.sin(frameCount*0.15);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  });

  // powerups
  powerups.forEach(p=>{
    ctx.font = `${CELL}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.globalAlpha = 0.6 + 0.4*(p.life/200);
    ctx.fillText(p.emoji, p.x*CELL+CELL/2, p.y*CELL+CELL/2);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#facc15';
    ctx.lineWidth = 1;
    ctx.strokeRect(p.x*CELL+1, p.y*CELL+1, CELL-2, CELL-2);
  });

  // ── SNAKE RENDERING — FLUID BODY ──
  const sp = SPECIES[selSp];
  const glowCol = sp.glow;

  function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
  function darkenC(h,a){const[r,g,b]=hexRgb(h);return'rgb('+Math.round(r*a)+','+Math.round(g*a)+','+Math.round(b*a)+')';}
  function lightenC(h,a){const[r,g,b]=hexRgb(h);return'rgb('+Math.min(255,Math.round(r+(255-r)*a))+','+Math.min(255,Math.round(g+(255-g)*a))+','+Math.min(255,Math.round(b+(255-b)*a))+')';}

  const spStyles = {
    0:{dark:'#2d0a5e',belly:'#e9d5ff',r:0.55,g:0,b:0.9},
    1:{dark:'#0a3d6b',belly:'#e0f9ff',r:0,g:0.7,b:1},
    2:{dark:'#7c2d12',belly:'#fef3c7',r:1,g:0.4,b:0},
    3:{dark:'#7f0a2a',belly:'#fff0f5',r:1,g:0.1,b:0.5},
    4:{dark:'#14532d',belly:'#f0ffd4',r:0.1,g:0.8,b:0.2},
    5:{dark:'#0a0500',belly:'#fbbf24',r:0.05,g:0.05,b:0.05,fire:true},
    6:{dark:'#7f1d1d',belly:'#fff0e0',r:0.9,g:0.1,b:0.1},
    7:{dark:'#713f12',belly:'#fef9c3',r:1,g:0.85,b:0},
    8:{dark:'#1e1b4b',belly:'#f5f3ff',rainbow:true},
  };
  const sty = spStyles[selSp] || {dark:'#111',belly:'#eee',r:0.5,g:0.5,b:0.5};

  if(snake.length < 2) {
    ctx.restore && ctx.restore();
  } else {

  // Build smooth spine points using catmull-rom
  function catmullRom(pts) {
    const res = [];
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(0,i-1)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(pts.length-1,i+2)];
      for(let t=0;t<=1;t+=0.1){
        const t2=t*t,t3=t2*t;
        res.push({
          x:0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
          y:0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
        });
      }
    }
    return res;
  }

  const rawPts = snake.map(s=>({x:s.x*CELL+CELL/2, y:s.y*CELL+CELL/2}));
  const spine = catmullRom(rawPts);
  const N = spine.length;

  function getNorm(i){
    const a=spine[Math.max(0,i-1)], b=spine[Math.min(N-1,i+1)];
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.sqrt(dx*dx+dy*dy)||1;
    return {nx:-dy/len, ny:dx/len};
  }

  function getWidth(i){
    const f = i/N;
    const base = CELL * 0.82;
    // taper tail, slightly bigger at head
    if(f < 0.05) return base * 1.05;
    if(f > 0.85) return base * (1-(f-0.85)/0.15*0.6);
    return base * (1 - f*0.12);
  }

  // ── 1. DRAW SHADOW ──
  ctx.beginPath();
  spine.forEach((p,i)=>{
    const n=getNorm(i), w=getWidth(i)+2;
    if(i===0) ctx.moveTo(p.x+n.nx*w+2, p.y+n.ny*w+4);
    else ctx.lineTo(p.x+n.nx*w+2, p.y+n.ny*w+4);
  });
  for(let i=N-1;i>=0;i--){
    const n=getNorm(i),w=getWidth(i)+2;
    ctx.lineTo(spine[i].x-n.nx*w+2, spine[i].y-n.ny*w+4);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fill();

  // ── 2. DRAW BASE BODY SHAPE ──
  ctx.beginPath();
  spine.forEach((p,i)=>{
    const n=getNorm(i),w=getWidth(i);
    if(i===0) ctx.moveTo(p.x+n.nx*w, p.y+n.ny*w);
    else ctx.lineTo(p.x+n.nx*w, p.y+n.ny*w);
  });
  for(let i=N-1;i>=0;i--){
    const n=getNorm(i),w=getWidth(i);
    ctx.lineTo(spine[i].x-n.nx*w, spine[i].y-n.ny*w);
  }
  ctx.closePath();

  // Color gradient along body
  if(sty.rainbow) {
    // Animated rainbow
    const grad = ctx.createLinearGradient(spine[0].x,spine[0].y,spine[N-1].x,spine[N-1].y);
    const hOff = frameCount*2;
    grad.addColorStop(0, 'hsl('+hOff%360+',100%,55%)');
    grad.addColorStop(0.33, 'hsl('+(hOff+120)%360+',100%,55%)');
    grad.addColorStop(0.66, 'hsl('+(hOff+240)%360+',100%,55%)');
    grad.addColorStop(1, 'hsl('+hOff%360+',100%,55%)');
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = glowCol;
  }
  ctx.fill();
  ctx.strokeStyle = sty.dark;
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // ── 3. BELLY STRIP ──
  ctx.beginPath();
  spine.forEach((p,i)=>{
    const n=getNorm(i),w=getWidth(i)*0.45;
    if(i===0) ctx.moveTo(p.x-n.nx*w, p.y-n.ny*w);
    else ctx.lineTo(p.x-n.nx*w, p.y-n.ny*w);
  });
  for(let i=N-1;i>=0;i--){
    const n=getNorm(i),w=getWidth(i)*0.45;
    ctx.lineTo(spine[i].x+n.nx*w, spine[i].y+n.ny*w);
  }
  ctx.closePath();
  ctx.fillStyle = sty.belly+'88';
  ctx.fill();

  // ── 4. SCALES along body ──
  for(let i=3; i<N-3; i+=5){
    const p=spine[i], n=getNorm(i), w=getWidth(i);
    const angle=Math.atan2(n.ny,n.nx)+Math.PI/2;

    // Two scales per row (left and right of spine)
    [-0.55, 0.55].forEach(side=>{
      const sx=p.x+n.nx*w*side, sy=p.y+n.ny*w*side;
      const sr=w*0.42;

      ctx.save();
      ctx.translate(sx,sy);
      ctx.rotate(angle + (side>0?0.3:-0.3));

      // Hex scale shape
      ctx.beginPath();
      for(let v=0;v<6;v++){
        const va=(Math.PI/3)*v;
        const vx=Math.cos(va)*sr*0.9, vy=Math.sin(va)*sr*0.65;
        v===0?ctx.moveTo(vx,vy):ctx.lineTo(vx,vy);
      }
      ctx.closePath();

      let scaleColor = glowCol;
      if(sty.rainbow) scaleColor='hsl('+((i*18+frameCount*2)%360)+',100%,55%)';
      if(sty.fire) scaleColor = i%6<3 ? '#1a0800' : '#2d0f00';

      const sg=ctx.createRadialGradient(-sr*0.2,-sr*0.2,0,0,0,sr);
      sg.addColorStop(0, lightenC(scaleColor,0.45));
      sg.addColorStop(0.6, scaleColor);
      sg.addColorStop(1, sty.dark);
      ctx.fillStyle=sg; ctx.fill();
      ctx.strokeStyle=sty.dark; ctx.lineWidth=0.6; ctx.stroke();

      // Shine
      ctx.beginPath();
      ctx.ellipse(-sr*0.2,-sr*0.22,sr*0.32,sr*0.2,-0.4,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.32)'; ctx.fill();

      ctx.restore();
    });

    // Fire effect for cobra negra
    if(sty.fire && i%8===0){
      const fp=spine[i];
      const fw=getWidth(i);
      ctx.save();
      ctx.translate(fp.x+n.nx*fw*0.1, fp.y+n.ny*fw*0.1);
      ctx.rotate(angle);
      for(let f=0;f<2;f++){
        const fx=(f-0.5)*fw*0.8;
        const flicker=Math.sin(frameCount*0.3+i+f)*0.3;
        ctx.beginPath();
        ctx.moveTo(fx, 0);
        ctx.quadraticCurveTo(fx+fw*0.3*flicker, -fw*(0.8+flicker*0.3), fx, -fw*(1.3+flicker*0.4));
        ctx.strokeStyle='rgba(251,146,60,0.65)';
        ctx.lineWidth=fw*0.35; ctx.lineCap='round'; ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(fx, 0);
        ctx.quadraticCurveTo(fx-fw*0.2*flicker, -fw*0.6, fx, -fw*(0.9+flicker*0.2));
        ctx.strokeStyle='rgba(250,204,21,0.5)';
        ctx.lineWidth=fw*0.18; ctx.stroke();
      }
      ctx.restore();
    }
  }

  // ── 5. TOP GLOSS SHINE ──
  ctx.beginPath();
  spine.forEach((p,i)=>{
    const n=getNorm(i),w=getWidth(i)*0.55;
    if(i===0) ctx.moveTo(p.x+n.nx*w*0.3, p.y+n.ny*w*0.3);
    else ctx.lineTo(p.x+n.nx*w*0.3, p.y+n.ny*w*0.3);
  });
  for(let i=N-1;i>=0;i--){
    const n=getNorm(i),w=getWidth(i)*0.55;
    ctx.lineTo(spine[i].x-n.nx*w*0.3, spine[i].y-n.ny*w*0.3);
  }
  ctx.closePath();
  const gloss=ctx.createLinearGradient(spine[0].x,spine[0].y,spine[Math.floor(N/2)].x,spine[Math.floor(N/2)].y);
  gloss.addColorStop(0,'rgba(255,255,255,0.22)');
  gloss.addColorStop(0.5,'rgba(255,255,255,0.08)');
  gloss.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gloss; ctx.fill();

  } // end snake.length check

  // ── 6. HEAD SPRITE ──
  const headSeg = snake[0];
  const hcx = headSeg.x*CELL+CELL/2, hcy = headSeg.y*CELL+CELL/2;
  const headAngle = Math.atan2(dir.y, dir.x);

  ctx.save();
  ctx.translate(hcx, hcy);
  ctx.rotate(headAngle);

  const hasParts = snakeParts[selSp];
  const headImg = (hasParts && hasParts.head && hasParts.head.complete && hasParts.head.naturalWidth > 0)
    ? hasParts.head
    : (snakeImgs[selSp] && snakeImgs[selSp].complete && snakeImgs[selSp].naturalWidth > 0 ? snakeImgs[selSp] : null);

  if(headImg){
    const hs = CELL * 3.2;
    ctx.drawImage(headImg, -hs/2, -hs/2, hs, hs);
  } else {
    // Fallback head
    const hg=ctx.createRadialGradient(-CELL*0.2,-CELL*0.2,0,0,0,CELL*0.9);
    hg.addColorStop(0,lightenC(glowCol,0.4)); hg.addColorStop(1,sty.dark);
    ctx.beginPath(); ctx.arc(0,0,CELL*0.7,0,Math.PI*2);
    ctx.fillStyle=hg; ctx.fill();
  }
  ctx.restore();

  // ── 7. HEAD GLOW ──
  const aura=ctx.createRadialGradient(hcx,hcy,CELL*0.2,hcx,hcy,CELL*2.0);
  aura.addColorStop(0,glowCol+'55');
  aura.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(hcx,hcy,CELL*2.0,0,Math.PI*2);
  ctx.fillStyle=aura; ctx.fill();


  // score popup effect
  if(frameCount % 40 === 0 && score > 0){
    ctx.font = '700 11px Nunito';
    ctx.fillStyle = '#facc15';
    ctx.textAlign = 'left';
  }
}

function endGame(won){
  dead = true;
  clearInterval(gameLoop);
  const sp = SPECIES[selSp];
  document.getElementById('goTitle').textContent = won ? '🏆 ¡GANASTE!' : '💀 GAME OVER';
  document.getElementById('goTitle').className = 'go-title ' + (won?'win':'lose');
  document.getElementById('goScore').textContent = score + ' puntos';
  document.getElementById('goSub').textContent = 'Tamaño máximo: ' + snake.length + ' | Nivel ' + level;
  const gi = document.getElementById('goSnakeImg');
  if(sp.img){ gi.src=IMG_BASE+sp.img; gi.style.display='block'; }
  else{ gi.style.display='none'; }
  showScreen('gameOverScreen');
}

function pauseGame(){
  paused = !paused;
}

function goToSelect(){
  clearInterval(gameLoop);
  showScreen('selectScreen');
  buildSelect();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── SWIPE CONTROLS ───
let touchStart = null;
function setupSwipe(){
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); touchStart={x:e.touches[0].clientX, y:e.touches[0].clientY}; }, {passive:false});
  canvas.addEventListener('touchend', e=>{
    if(!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if(Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if(Math.abs(dx) > Math.abs(dy)){
      if(dx > 0 && dir.x !== -1) nextDir = {x:1,y:0};
      else if(dx < 0 && dir.x !== 1) nextDir = {x:-1,y:0};
    } else {
      if(dy > 0 && dir.y !== -1) nextDir = {x:0,y:1};
      else if(dy < 0 && dir.y !== 1) nextDir = {x:0,y:-1};
    }
    touchStart = null;
  }, {passive:false});
}

function setupKeys(){
  document.onkeydown = e => {
    if(e.key==='ArrowUp'&&dir.y!==1) nextDir={x:0,y:-1};
    else if(e.key==='ArrowDown'&&dir.y!==-1) nextDir={x:0,y:1};
    else if(e.key==='ArrowLeft'&&dir.x!==1) nextDir={x:-1,y:0};
    else if(e.key==='ArrowRight'&&dir.x!==-1) nextDir={x:1,y:0};
    else if(e.key===' ') pauseGame();
  };
}
